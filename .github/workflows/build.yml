name: build

on:
  push:
    branches:
      - master
      - crossbuild_wf
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        host: [x86_64-linux-gnu, powerpc-linux-gnu]
        include:
          - os: ubuntu-latest
            cc: gcc
            cxx: g++
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo add-apt-repository -y "deb http://archive.ubuntu.com/ubuntu `lsb_release -sc` main universe"
        sudo apt-get update -y -qq
        sudo apt-get install libasound2-dev libpulse-dev libwebp-dev libxrandr-dev
    - name: install cross compiler
      if: matrix.host != 'x86_64-linux-gnu'
      run: sudo apt-get install -y gcc-${{ matrix.host }}
    - name: configure
      env:
        CC: ${{ matrix.host }}-${{ matrix.cc }}
        CXX: ${{ matrix.host }}-${{ matrix.cxx }}
      run: |
        ./configure --with-internal-libs --platform=${{ matrix.host }}
    - name: reconfigure extlibs (ogg)
      run: |
        cd extlib/src/libogg-1.3.5
        autoreconf -fi
        autoupdate
    - name: build
      run: |
        NCPUS=$(getconf _NPROCESSORS_ONLN)
        make -j $NCPUS VERBOSE=true
